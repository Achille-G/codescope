<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f">
        <animate attributeName="stop-color" values="#0a0a0f;#1a1a2e;#0a0a0f" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#0a0a0f">
        <animate attributeName="stop-color" values="#0a0a0f;#1a1a2e;#0a0a0f" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#67e8f9;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#f0f9ff;#ffffff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#67e8f9;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>

    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Animated grid -->
  <g opacity="0.08">
    <path d="M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M300 0 L300 400 M600 0 L600 400 M900 0 L900 400" stroke="#22d3ee" stroke-width="1"/>
    <path d="M150 0 L150 400 M450 0 L450 400 M750 0 L750 400 M1050 0 L1050 400" stroke="#22d3ee" stroke-width="0.5"/>
  </g>

  <!-- Floating particles -->
  <g fill="#22d3ee" opacity="0.4">
    <circle cx="80" cy="120" r="2">
      <animate attributeName="cy" values="120;100;120" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="350" r="1.5">
      <animate attributeName="cy" values="350;330;350" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="80" r="2.5">
      <animate attributeName="cy" values="80;60;80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="300" r="1.5">
      <animate attributeName="cy" values="300;280;300" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="280" r="2">
      <animate attributeName="cy" values="280;260;280" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="180" r="1.5">
      <animate attributeName="cy" values="180;160;180" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Code scope icon representation -->
  <g transform="translate(60, 140)">
    <!-- Magnifying glass / scope -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#accentGradient)" stroke-width="4" filter="url(#softGlow)">
      <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="35" fill="url(#codeGradient)" opacity="0.9"/>
    <path d="M85 85 L110 110" stroke="url(#accentGradient)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Code bracket inside scope -->
    <text x="50" y="60" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="32" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- Terminal with search -->
  <g transform="translate(920, 120)">
    <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#codeGradient)" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="0" y="0" width="200" height="24" rx="10" fill="#1e293b"/>
    <circle cx="15" cy="12" r="5" fill="#ef4444"/>
    <circle cx="35" cy="12" r="5" fill="#f59e0b"/>
    <circle cx="55" cy="12" r="5" fill="#22c55e"/>

    <!-- Search query -->
    <text x="15" y="50" fill="#22d3ee" font-family="monospace" font-size="13">$ codescope search</text>
    <rect x="95" y="38" width="8" height="14" fill="#22d3ee">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Results -->
    <text x="15" y="75" fill="#67e8f9" font-family="monospace" font-size="11" opacity="0.8">fn auth_user() ✓</text>
    <text x="15" y="92" fill="#67e8f9" font-family="monospace" font-size="11" opacity="0.6">class TokenManager ✓</text>
    <text x="15" y="109" fill="#67e8f9" font-family="monospace" font-size="11" opacity="0.4">impl JWT │ 2 matches</text>
    <text x="15" y="126" fill="#22c55e" font-family="monospace" font-size="10">⚡ 0.003s</text>
  </g>

  <!-- Main title -->
  <text x="600" y="155" text-anchor="middle" fill="url(#textGradient)" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" filter="url(#textGlow)">
    codescope
  </text>
  <text x="600" y="210" text-anchor="middle" fill="url(#accentGradient)" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="2">
    STRUCTURAL CODE SEARCH
  </text>

  <!-- Tagline -->
  <text x="600" y="260" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="18">
    Fast, offline, multi-OS CLI for semantic code search
  </text>

  <!-- Feature badges -->
  <g transform="translate(280, 290)">
    <!-- Offline badge -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="100" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
      <rect x="0" y="0" width="100" height="36" rx="18" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="50" y="23" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🔒 Offline</text>
    </g>

    <!-- Fast badge -->
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="90" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
      <rect x="0" y="0" width="90" height="36" rx="18" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <text x="45" y="23" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">⚡ Fast</text>
    </g>

    <!-- Cross-platform badge -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="140" height="36" rx="18" fill="#8b5cf6" opacity="0.15"/>
      <rect x="0" y="0" width="140" height="36" rx="18" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="70" y="23" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🌍 Cross-OS</text>
    </g>

    <!-- Semantic badge -->
    <g transform="translate(375, 0)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="#f59e0b" opacity="0.15"/>
      <rect x="0" y="0" width="120" height="36" rx="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="60" y="23" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🧠 Semantic</text>
    </g>

    <!-- AI-ready badge -->
    <g transform="translate(510, 0)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="#ec4899" opacity="0.15"/>
      <rect x="0" y="0" width="120" height="36" rx="18" fill="none" stroke="#f472b6" stroke-width="1.5"/>
      <text x="60" y="23" text-anchor="middle" fill="#f472b6" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🤖 AI-Ready</text>
    </g>
  </g>

  <!-- Decorative floating code elements -->
  <g opacity="0.12" fill="#22d3ee" font-family="monospace" font-size="10">
    <text x="180" y="60" transform="rotate(-15, 180, 60)">BM25</text>
    <text x="1000" y="350" transform="rotate(10, 1000, 350)">HNSW</text>
    <text x="50" y="380" transform="rotate(5, 50, 380)">SQLite</text>
    <text x="1150" y="70" transform="rotate(-8, 1150, 70)">ONNX</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="300" y="365" width="600" height="2" fill="url(#accentGradient)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>